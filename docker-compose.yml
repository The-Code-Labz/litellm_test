services:
  litellm:
    build:
      context: .
      args:
        target: runtime
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    container_name: litellm
    #########################################
    ## Uncomment these lines to start proxy with a config.yaml file ##
    # volumes:
    #  - ./config.yaml:/app/config.yaml <<- this is missing in the docker-compose file currently
    # command:
    #  - "--config=/app/config.yaml"
    ##############################################
#    ports:
#      - "4000:4000" # Map the container port to the host, change the host port if necessary
    environment:
        DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/litellm"
        STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
    env_file:
      - .env # Load local .env file
    depends_on:
      db:
        condition: service_healthy  # Wait for the db service to be healthy before starting the litellm service           
    healthcheck:  # Defines the health check configuration for the container
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health/liveliness || exit 1" ]  # Command to execute for health check
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 3     # Retry up to 3 times if health check fails
      start_period: 40s  # Wait 40 seconds after container start before beginning health checks
    networks: 
      - dokploy-network
    labels:  # Traefik labels for routing traffic to the container
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`litellm.archive.neurolearninglabs.com`)"  # Traefik router rule to route traffic to the container
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"  # Traefik service port
      - "traefik.http.routers.litellm.entrypoints=websecure"  # Traefik entrypoint
      - "traefik.docker.network=dokploy-network"  # Traefik network
      - "traefik.http.routers.litellm.tls=true"  # Enable TLS
      - "traefik.http.routers.litellm.tls.certresolver=cloudflare"  # Cert resolver
#      - "com.centurylinklabs.watchtower.enable=true"  # Enable watchtower for auto-updates
      - "traefik.http.routers.litellm.service=litellm"  # Traefik service
#      - "traefik.http.routers.litellm.middlewares=authentik@file"  # Middleware for basic auth
##################################################################################################### 
  db:
    image: postgres:16
    container_name: litellm_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
#    ports:
#      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data  # Persists Postgres data across container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U ${POSTGRES_USER}"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - dokploy-network
#####################################################################################################
  prometheus:
    image: prom/prometheus
    container_name: litellm_prometheus
    restart: always
    volumes:
      - ./prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
#    ports:
#      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - dokploy-network
# ...rest of your docker-compose config if any
networks:
  dokploy-network:
    external: true
